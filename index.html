<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinisch & Co.</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <!-- Meta Tags -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; upgrade-insecure-requests;" />
    <meta name="description" content="Clinical Communication & Data Integration Services">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://clinisch.com" />
    <meta property="og:title" content="Clinisch & Co.">
    <meta property="og:description" content="Clinical Communication & Data Integration Services">
    <meta property="og:image" content="https://clinisch.com/public/assets/images/webp/01_hero_main.webp">
    <!-- CSS -->
    <link rel="stylesheet" href="public/css/index.css">
    <!-- JS -->
    <script type="module" src="public/js/index.js"></script>
</head>

<body>
    <main>
        <!-- 히어로 섹션 -->
        <section id="hero">
            <div class="hero-content">
                <h2 class="hero-title"></h2>
                <p class="hero-text"></p>
            </div>
        </section>

        <!-- 컨텐츠 섹션 -->
        <section id="contents">
            <div class="container">
                <article class="contents-card">
                    <img src="public/assets/images/webp/0101_contents.webp" alt="Clinical Communication Integration"
                        class="contents-image">
                    <div class="contents-textbox">
                        <h3 class="content-title"></h3>
                        <p class="contents-text"></p>
                    </div>
                </article>
            </div>
        </section>

        <!-- 인사이트 섹션 (4열 그리드) -->
        <section id="insights">
            <div class="container">
                <div class="grid-insight">
                    <article class="card-insight card-wide">
                        <img src="public/assets/images/webp/0102_Expert.webp" alt="Clinical Expert Advisory"
                            class="img-box">
                        <div class="text-box">
                            <h4 class="ins-title"></h4>
                            <p class="ins-text"></p>
                        </div>
                    </article>
                    <article class="card-insight">
                        <img src="public/assets/images/webp/0103_modular.webp" alt="Clinical Data Science"
                            class="img-box">
                        <div class="text-box">
                            <h4 class="ins-title"></h4>
                            <p class="ins-text"></p>
                        </div>
                    </article>
                    <article class="card-insight">
                        <img src="public/assets/images/webp/0104_first.webp" alt="Healthcare Solutions" class="img-box">
                        <div class="text-box">
                            <h4 class="ins-title"></h4>
                            <p class="ins-text"></p>
                        </div>
                    </article>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
