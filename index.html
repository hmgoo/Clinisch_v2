<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinisch & Co.</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <!-- Meta Tags -->
    <meta name="description" content="Clinical Communication & Data Integration Services">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Clinisch & Co.">
    <meta property="og:description" content="Clinical Communication & Data Integration Services">
    <meta property="og:image" content="public/assets/images/png/01_hero_main.png">
    <!-- CSS -->
    <link rel="stylesheet" href="public/css/index.css">
    <!-- JS -->
    <script type="module" src="public/js/index.js"></script>
</head>

<body>
    <main>
        <!-- 히어로 섹션 -->
        <section id="hero">
            <div class="hero-content">
                <h2 class="hero-title"></h2>
                <p class="hero-desc"></p>
            </div>
        </section>

        <!-- 컨텐츠 섹션 -->
        <section id="contents">
            <div class="container">
                <article class="content-card">
                    <img src="public/assets/images/png/0101_contents.png" alt="Clinical Communication Integration"
                        class="content-image">
                    <div class="text-grp">
                        <h3 class="content-title"></h3>
                        <p class="content-desc"></p>
                    </div>
                </article>
            </div>
        </section>

        <!-- 인사이트 섹션 (4열 그리드) -->
        <section id="insights">
            <div class="container">
                <div class="grid-insight">
                    <article class="card-insight card-wide">
                        <img src="public/assets/images/png/0102_Expert.png" alt="Clinical Expert Advisory"
                            class="img-box">
                        <div class="text-box">
                            <h4 class="ins-title"></h4>
                            <p class="ins-desc"></p>
                        </div>
                    </article>
                    <article class="card-insight">
                        <img src="public/assets/images/png/0103_modular.png" alt="Clinical Data Science"
                            class="img-box">
                        <div class="text-box">
                            <h4 class="ins-title"></h4>
                            <p class="ins-desc"></p>
                        </div>
                    </article>
                    <article class="card-insight">
                        <img src="public/assets/images/png/0104_first.png" alt="Healthcare Solutions" class="img-box">
                        <div class="text-box">
                            <h4 class="ins-title"></h4>
                            <p class="ins-desc"></p>
                        </div>
                    </article>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
